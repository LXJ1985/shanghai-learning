server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: shanghai-learning

  # H2 文件数据库（本地开发，数据持久化到文件，重启不丢失）
  datasource:
    url: jdbc:h2:file:./data/shanghai_learning;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 控制台（浏览器访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  # 禁用 Redis（本地开发不需要）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # 初始化 SQL
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.learning.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: shanghai-learning-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 86400000

# 文件存储
file:
  upload-path: ./uploads/

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 日志
logging:
  level:
    com.learning: debug
