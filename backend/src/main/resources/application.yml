server:
  port: 8080

spring:
  application:
    name: shanghai-learning
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/shanghai_learning?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.learning.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl 仅在开发环境启用，生产环境请注释掉
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: shanghai-learning-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 86400000  # 24小时

# 文件存储配置
file:
  upload-path: ./uploads/

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 日志
logging:
  level:
    com.learning: debug
